name = "bountyscope"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "public"
binding = "ASSETS"

[ai]
binding = "AI"

# Poll Immunefi every 30 minutes
[triggers]
crons = ["*/30 * * * *"]

[[kv_namespaces]]
binding = "BS_PROGRAMS"
id = "adb265fbafad49cb8b781bb4e64d2561"

[[kv_namespaces]]
binding = "BS_REPORTS"
id = "4d5c933f26494a32a1a19850628179d8"

[vars]
USER_AGENT = "BountyScope research bot"
PAYRAIL_URL = "https://payrail.ivixivi.workers.dev"

# Shared fleet money rail (service binding — internal worker→worker call).
[[services]]
binding = "PAYRAIL"
service = "payrail"

[observability]
enabled = true
